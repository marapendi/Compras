<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Compras - Azul & Branco</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar { background-color: #004085; } /* Azul Escuro */
    .btn-primary { background-color: #004085; border: none; }
    .btn-primary:hover { background-color: #002752; }
    .card-header { background-color: #e7f1ff; color: #004085; font-weight: bold; }
    .section-form { display: none; padding: 20px; }
    .active-section { display: block; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">📦 Gestão de Compras</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('prodSection')">Produtos</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('fornSection')">Fornecedores</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('listaSection')">Lista de Compras</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('cotacaoSection')">Cotações</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('auxSection')">Unidades/Grupos</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container bg-white shadow-sm p-4 rounded">
  
  <section id="prodSection" class="section-form active-section">
    <h3>Cadastro de Produto</h3>
    <form id="formProduto" class="row g-3">
      <div class="col-md-2"><label>ID</label><input type="text" class="form-control" name="id"></div>
      <div class="col-md-4"><label>Produto</label><input type="text" class="form-control" name="produto"></div>
      <div class="col-md-3"><label>Marca</label><input type="text" class="form-control" name="marca"></div>
      <div class="col-md-3"><label>Unidade</label><select class="form-select select-unidade" name="und"></select></div>
      <div class="col-md-3"><label>Fator Mult.</label><input type="number" class="form-control" name="fator"></div>
      <div class="col-md-3"><label>Grupo</label><select class="form-select select-grupo" name="grupo"></select></div>
      <div class="col-md-3"><label>Status</label><input type="text" class="form-control" name="status"></div>
      <div class="col-md-3"><label>Apelido</label><input type="text" class="form-control" name="apelido"></div>
      <div class="col-12"><button type="button" class="btn btn-primary" onclick="salvar('Produtos', 'formProduto')">Salvar Produto</button></div>
    </form>
  </section>

  <section id="listaSection" class="section-form">
    <h3>Lista de Compras</h3>
    <form id="formLista" class="row g-3">
      <div class="col-md-6"><label>Produto (Base de Dados)</label>
        <select class="form-select" name="produto" id="listProdSelect" onchange="autoPreencherProduto(this.value)">
          </select>
      </div>
      <div class="col-md-3"><label>Quantidade</label><input type="number" class="form-control" name="qtd"></div>
      <div class="col-md-3"><label>Data</label><input type="date" class="form-control" name="data"></div>
      <div class="col-12 mt-3">
         <button type="button" class="btn btn-success" onclick="gerarCotacao()">Gerar Lista para Cotação</button>
      </div>
    </form>
  </section>

  <section id="cotacaoSection" class="section-form">
    <h3>Área do Fornecedor - Preencher Cotação</h3>
    <div class="table-responsive">
      <table class="table table-bordered mt-3">
        <thead>
          <tr>
            <th>Produto</th><th>Qtd</th><th>Unid</th><th>Preço (R$)</th><th>Observação</th>
          </tr>
        </thead>
        <tbody id="tabelaCotacao">
          </tbody>
      </table>
    </div>
    <button class="btn btn-primary" onclick="enviarCotacao()">Enviar Cotação para Apreciação</button>
  </section>

</div>

<script>
  // Navegação simples entre telas
  function showSection(id) {
    document.querySelectorAll('.section-form').forEach(s => s.classList.remove('active-section'));
    document.getElementById(id).classList.add('active-section');
    carregarDropdowns();
  }

  // Carrega Unidades, Grupos e Produtos nos Dropdowns
  function carregarDropdowns() {
    google.script.run.withSuccessHandler(function(data) {
      // Lógica para preencher selects de Unidades e Grupos
    }).buscarDadosAba('Unidades');
  }

  function salvar(aba, formId) {
    const form = document.getElementById(formId);
    const dados = new FormData(form);
    const arrayDados = Array.from(dados.values());
    
    google.script.run.withSuccessHandler(() => {
      alert("Dados salvos em " + aba);
      form.reset();
    }).salvarDados(aba, arrayDados);
  }

  function gerarCotacao() {
    alert("Lista de cotação gerada. Os fornecedores agora podem visualizar os campos de preço.");
    showSection('cotacaoSection');
  }

  function enviarCotacao() {
    alert("Cotação enviada com sucesso para análise!");
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
