<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SDSSANTOS - Sistema de Compras - Google Sheets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(145deg, #eef5ff 0%, #d9eaff 100%); padding: 20px; min-height: 100vh; }
        .app-container { max-width: 1400px; margin: 0 auto; background: #ffffffdd; backdrop-filter: blur(2px); border-radius: 2rem; padding: 1rem; box-shadow: 0 20px 35px -10px rgba(0, 40, 80, 0.3); }
        .header { background: linear-gradient(135deg, #0a2f6c, #0c4a8a); color: white; padding: 1rem 1.5rem; border-radius: 1.5rem; margin-bottom: 1.8rem; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.6rem; font-weight: 600; }
        .status-badge { background: #27ae60; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .nav-buttons { display: flex; flex-wrap: wrap; gap: 0.7rem; margin-bottom: 1.5rem; }
        .nav-btn { background: #f0f9ff; border: none; padding: 0.7rem 1.2rem; border-radius: 40px; font-weight: 600; color: #0a2f6c; cursor: pointer; transition: all 0.2s; }
        .nav-btn.active { background: #ffcd7e; color: #0a2f6c; }
        .nav-btn:hover { transform: translateY(-2px); background: #ffe0a3; }
        .screen { background: white; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #cde4ff; }
        .hidden { display: none; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.2rem; margin-bottom: 1.8rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-weight: 600; color: #0a2f6c; font-size: 0.85rem; }
        input, select, textarea { padding: 0.7rem 0.9rem; border: 1px solid #b9d4ff; border-radius: 1rem; font-size: 0.9rem; }
        button { background: #0a2f6c; color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 2rem; font-weight: bold; cursor: pointer; margin-right: 0.5rem; margin-bottom: 0.5rem; }
        button:hover { background: #0e4b8a; }
        .btn-secondary { background: #3b82f6; }
        .btn-warning { background: #e67e22; }
        .btn-danger { background: #c0392b; }
        .responsive-table { overflow-x: auto; margin-top: 1rem; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { border: 1px solid #cfe2ff; padding: 0.6rem; text-align: left; font-size: 0.8rem; }
        th { background: #e3f0ff; color: #0a2f6c; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000aa; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; border-radius: 2rem; padding: 1.5rem; }
        .fornecedor-item { border: 1px solid #ccc; border-radius: 1rem; margin-bottom: 1rem; padding: 1rem; }
        .debug-panel { background: #2c3e50; color: #ecf0f1; border-radius: 1rem; padding: 1rem; margin-top: 1rem; font-family: monospace; font-size: 0.8rem; max-height: 300px; overflow-y: auto; }
        .debug-error { color: #e74c3c; }
        .debug-success { color: #2ecc71; }
        .debug-info { color: #3498db; }
        @media (max-width: 640px) { body { padding: 10px; } .form-grid { grid-template-columns: 1fr; } .nav-btn { padding: 0.5rem 0.8rem; font-size: 0.75rem; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>💼 SDSSANTOS - SysCompras | Google Sheets</h1>
        <div class="status-badge" id="connStatus">🟡 Conectando...</div>
    </div>
    
    <div class="nav-buttons">
        <button class="nav-btn" data-screen="unidades">📏 Unidades</button>
        <button class="nav-btn" data-screen="grupos">🏷️ Grupos</button>
        <button class="nav-btn" data-screen="produtos">📦 Produtos</button>
        <button class="nav-btn" data-screen="fornecedores">🏢 Fornecedores</button>
        <button class="nav-btn" data-screen="listaCompras">🛒 Lista Compras</button>
        <button class="nav-btn" data-screen="cotacoes">📊 Cotações</button>
    </div>

    <!-- TELA UNIDADES -->
    <div id="screen-unidades" class="screen">
        <h2>📏 Unidades</h2>
        <div class="form-grid">
            <div class="form-group"><label>ID</label><input id="undId" readonly></div>
            <div class="form-group"><label>Descrição</label><input id="undDesc" placeholder="Ex: Quilograma"></div>
            <div class="form-group"><label>Unidade</label><input id="undSigla" placeholder="Ex: KG"></div>
        </div>
        <button onclick="salvarUnidade()">💾 Salvar Unidade</button>
        <div class="responsive-table"><table id="tabelaUnidades"><thead><tr><th>ID</th><th>Descrição</th><th>Unidade</th><th>Ações</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- TELA GRUPOS -->
    <div id="screen-grupos" class="screen hidden">
        <h2>🏷️ Grupos</h2>
        <div class="form-grid">
            <div class="form-group"><label>ID</label><input id="grpId" readonly></div>
            <div class="form-group"><label>Grupo</label><input id="grpNome" placeholder="Nome do grupo"></div>
        </div>
        <button onclick="salvarGrupo()">💾 Salvar Grupo</button>
        <div class="responsive-table"><table id="tabelaGrupos"><thead><tr><th>ID</th><th>Grupo</th><th>Ações</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- TELA PRODUTOS -->
    <div id="screen-produtos" class="screen hidden">
        <h2>📦 Produtos</h2>
        <div class="form-grid">
            <div class="form-group"><label>ID</label><input id="prodId" readonly></div>
            <div class="form-group"><label>Produto</label><input id="prodNome"></div>
            <div class="form-group"><label>Marca</label><input id="prodMarca"></div>
            <div class="form-group"><label>Unidade</label><select id="prodUnidade"></select></div>
            <div class="form-group"><label>Fator</label><input id="prodFator" value="1"></div>
            <div class="form-group"><label>Grupo</label><select id="prodGrupo"></select></div>
            <div class="form-group"><label>Status</label><select id="prodStatus"><option>Ativo</option><option>Inativo</option></select></div>
            <div class="form-group"><label>Apelido</label><input id="prodApelido"></div>
        </div>
        <button onclick="salvarProduto()">💾 Salvar</button>
        <div class="responsive-table"><table id="tabelaProdutos"><thead><tr><th>ID</th><th>Produto</th><th>Marca</th><th>Unidade</th><th>Grupo</th><th>Ações</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- TELA FORNECEDORES (simplificada) -->
    <div id="screen-fornecedores" class="screen hidden">
        <h2>🏢 Fornecedores</h2>
        <div class="form-grid">
            <div class="form-group"><label>ID</label><input id="forId" readonly></div>
            <div class="form-group"><label>Fornecedor</label><input id="forNome"></div>
            <div class="form-group"><label>Email</label><input id="forEmail"></div>
            <div class="form-group"><label>Telefone</label><input id="forTelefone"></div>
        </div>
        <button onclick="salvarFornecedor()">💾 Salvar</button>
        <div class="responsive-table"><table id="tabelaFornecedores"><thead><tr><th>ID</th><th>Fornecedor</th><th>Email</th><th>Ações</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- TELA LISTA COMPRAS -->
    <div id="screen-listaCompras" class="screen hidden">
        <h2>🛒 Lista Compras</h2>
        <div class="form-grid">
            <div class="form-group"><label>ID</label><input id="lcId" readonly></div>
            <div class="form-group"><label>Produto</label><select id="lcProduto"></select></div>
            <div class="form-group"><label>Quantidade</label><input id="lcQtd" value="1"></div>
            <div class="form-group"><label>Data</label><input type="date" id="lcData"></div>
        </div>
        <button onclick="salvarListaCompra()">💾 Salvar</button>
        <button id="btnGerarCotacao" class="btn-warning">📄 Gerar Cotação</button>
        <div class="responsive-table"><table id="tabelaListaCompras"><thead><tr><th>ID</th><th>Produto</th><th>Quantidade</th><th>Ações</th></tr></thead><tbody></tbody></table></div>
    </div>

    <!-- TELA COTAÇÕES -->
    <div id="screen-cotacoes" class="screen hidden">
        <h2>📊 Cotações</h2>
        <div id="listaCotacoes"></div>
    </div>
</div>

<script>
    // 🔴 COLE SUA URL DO GOOGLE APPS SCRIPT AQUI 🔴
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxwAeE3NBSuv96qiCiSwzEXxpLsrcMQ92i3oIAkcoZaKXeSdXD_2lPIYcbf_Sz17F8S/exec";
    
    let unidades = [], grupos = [], produtos = [], fornecedores = [], listaCompras = [], cotacoes = [];
    
    // Função para fazer requisições usando JSONP (contorna CORS)
    async function apiRequest(acao, tabela, dados = null, id = null) {
        return new Promise((resolve, reject) => {
            const callbackName = 'callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            
            const params = new URLSearchParams();
            params.append('acao', acao);
            params.append('tabela', tabela);
            if (id) params.append('id', id);
            if (dados) params.append('data', JSON.stringify(dados));
            params.append('callback', callbackName);
            
            window[callbackName] = function(response) {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve(response);
            };
            
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?${params.toString()}`;
            script.onerror = function() {
                delete window[callbackName];
                document.body.removeChild(script);
                reject(new Error('Erro na requisição'));
            };
            document.body.appendChild(script);
        });
    }
    
    // Versão POST para salvar (usando iframe para contornar CORS)
    async function salvarDados(tabela, dados, id = null) {
        try {
            const formData = new FormData();
            formData.append('acao', 'salvar');
            formData.append('tabela', tabela);
            formData.append('data', JSON.stringify(dados));
            if (id) formData.append('id', id);
            
            // Usar fetch com mode no-cors (não podemos ler resposta, mas o dado é salvo)
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            });
            
            // Como não podemos ler a resposta no-cors, assumimos sucesso
            console.log('Requisição enviada para', tabela);
            return true;
        } catch (error) {
            console.error('Erro ao salvar:', error);
            return false;
        }
    }
    
    // Função para listar dados via GET com JSONP
    async function listarDados(tabela) {
        try {
            const response = await apiRequest('listar', tabela);
            return response.sucesso ? (response.dados || []) : [];
        } catch (error) {
            console.error(`Erro ao listar ${tabela}:`, error);
            return [];
        }
    }
    
    // CRUD Unidade
    window.salvarUnidade = async () => {
        const dados = {
            descricao: document.getElementById('undDesc').value,
            unidade: document.getElementById('undSigla').value,
            dataCadastro: new Date().toISOString()
        };
        if (!dados.unidade) return alert('Preencha a unidade');
        
        const sucesso = await salvarDados('unidades', dados);
        if (sucesso) {
            alert('Unidade salva!');
            await carregarTodasTabelas();
            document.getElementById('undDesc').value = '';
            document.getElementById('undSigla').value = '';
        } else {
            alert('Erro ao salvar. Verifique o console.');
        }
    };
    
    window.excluirUnidade = async (id) => {
        if (confirm('Excluir?')) {
            await fetch(`${SCRIPT_URL}?acao=excluir&tabela=unidades&id=${id}`, { mode: 'no-cors' });
            await carregarTodasTabelas();
        }
    };
    
    // CRUD Grupo
    window.salvarGrupo = async () => {
        const dados = { grupo: document.getElementById('grpNome').value, dataCadastro: new Date().toISOString() };
        if (!dados.grupo) return alert('Preencha o grupo');
        await salvarDados('grupos', dados);
        alert('Grupo salvo!');
        await carregarTodasTabelas();
        document.getElementById('grpNome').value = '';
    };
    
    window.excluirGrupo = async (id) => {
        if (confirm('Excluir?')) {
            await fetch(`${SCRIPT_URL}?acao=excluir&tabela=grupos&id=${id}`, { mode: 'no-cors' });
            await carregarTodasTabelas();
        }
    };
    
    // CRUD Produto
    window.salvarProduto = async () => {
        const dados = {
            produto: document.getElementById('prodNome').value,
            marca: document.getElementById('prodMarca').value,
            unidade: document.getElementById('prodUnidade').value,
            fatorMultiplicador: document.getElementById('prodFator').value,
            grupo: document.getElementById('prodGrupo').value,
            status: document.getElementById('prodStatus').value,
            apelido: document.getElementById('prodApelido').value,
            dataCadastro: new Date().toISOString()
        };
        if (!dados.produto) return alert('Nome do produto obrigatório');
        await salvarDados('produtos', dados);
        alert('Produto salvo!');
        await carregarTodasTabelas();
        limparProduto();
    };
    
    function limparProduto() {
        document.getElementById('prodId').value = '';
        document.getElementById('prodNome').value = '';
        document.getElementById('prodMarca').value = '';
        document.getElementById('prodUnidade').value = '';
        document.getElementById('prodFator').value = '1';
        document.getElementById('prodGrupo').value = '';
        document.getElementById('prodStatus').value = 'Ativo';
        document.getElementById('prodApelido').value = '';
    }
    
    window.excluirProduto = async (id) => {
        if (confirm('Excluir?')) {
            await fetch(`${SCRIPT_URL}?acao=excluir&tabela=produtos&id=${id}`, { mode: 'no-cors' });
            await carregarTodasTabelas();
        }
    };
    
    // CRUD Fornecedor
    window.salvarFornecedor = async () => {
        const dados = {
            fornecedor: document.getElementById('forNome').value,
            email: document.getElementById('forEmail').value,
            telefone: document.getElementById('forTelefone').value,
            dataCadastro: new Date().toISOString()
        };
        if (!dados.fornecedor) return alert('Nome obrigatório');
        await salvarDados('fornecedores', dados);
        alert('Fornecedor salvo!');
        await carregarTodasTabelas();
    };
    
    window.excluirFornecedor = async (id) => {
        if (confirm('Excluir?')) {
            await fetch(`${SCRIPT_URL}?acao=excluir&tabela=fornecedores&id=${id}`, { mode: 'no-cors' });
            await carregarTodasTabelas();
        }
    };
    
    // CRUD Lista Compra
    window.salvarListaCompra = async () => {
        const prodId = document.getElementById('lcProduto').value;
        const produto = produtos.find(p => p.id === prodId);
        if (!produto) return alert('Selecione um produto');
        
        const dados = {
            produto: produto.produto,
            marca: produto.marca,
            quantidade: document.getElementById('lcQtd').value,
            unidade: produto.unidade,
            data: document.getElementById('lcData').value,
            dataCadastro: new Date().toISOString()
        };
        await salvarDados('listaCompras', dados);
        alert('Item salvo!');
        await carregarTodasTabelas();
    };
    
    window.excluirListaCompra = async (id) => {
        if (confirm('Excluir?')) {
            await fetch(`${SCRIPT_URL}?acao=excluir&tabela=listaCompras&id=${id}`, { mode: 'no-cors' });
            await carregarTodasTabelas();
        }
    };
    
    // Renderizações
    function renderUnidades() {
        const tbody = document.querySelector('#tabelaUnidades tbody');
        tbody.innerHTML = unidades.map(u => `<tr><td>${u.id}</td><td>${u.descricao || ''}</td><td>${u.unidade || ''}</td><td><button class="btn-danger" onclick="excluirUnidade('${u.id}')">Excluir</button></td></tr>`).join('');
        if (unidades.length === 0) tbody.innerHTML = '<tr><td colspan="4">Nenhuma unidade</td></tr>';
    }
    
    function renderGrupos() {
        const tbody = document.querySelector('#tabelaGrupos tbody');
        tbody.innerHTML = grupos.map(g => `<tr><td>${g.id}</td><td>${g.grupo || ''}</td><td><button class="btn-danger" onclick="excluirGrupo('${g.id}')">Excluir</button></td></tr>`).join('');
        if (grupos.length === 0) tbody.innerHTML = '<tr><td colspan="3">Nenhum grupo</td></tr>';
        carregarDropdowns();
    }
    
    function renderProdutos() {
        const tbody = document.querySelector('#tabelaProdutos tbody');
        tbody.innerHTML = produtos.map(p => `<tr><td>${p.id}</td><td>${p.produto || ''}</td><td>${p.marca || ''}</td><td>${p.unidade || ''}</td><td>${p.grupo || ''}</td><td><button class="btn-danger" onclick="excluirProduto('${p.id}')">Excluir</button></td></tr>`).join('');
        carregarDropdowns();
    }
    
    function renderFornecedores() {
        const tbody = document.querySelector('#tabelaFornecedores tbody');
        tbody.innerHTML = fornecedores.map(f => `<tr><td>${f.id}</td><td>${f.fornecedor || ''}</td><td>${f.email || ''}</td><td><button class="btn-danger" onclick="excluirFornecedor('${f.id}')">Excluir</button></td></tr>`).join('');
    }
    
    function renderListaCompras() {
        const tbody = document.querySelector('#tabelaListaCompras tbody');
        tbody.innerHTML = listaCompras.map(l => `<tr><td>${l.id}</td><td>${l.produto || ''}</td><td>${l.quantidade || ''}</td><td><button class="btn-danger" onclick="excluirListaCompra('${l.id}')">Excluir</button></td></tr>`).join('');
        carregarDropdowns();
    }
    
    function carregarDropdowns() {
        const unidadeSelect = document.getElementById('prodUnidade');
        if (unidadeSelect) unidadeSelect.innerHTML = '<option value="">Selecione</option>' + unidades.map(u => `<option value="${u.unidade}">${u.descricao}</option>`).join('');
        
        const grupoSelect = document.getElementById('prodGrupo');
        if (grupoSelect) grupoSelect.innerHTML = '<option value="">Selecione</option>' + grupos.map(g => `<option value="${g.grupo}">${g.grupo}</option>`).join('');
        
        const prodSelect = document.getElementById('lcProduto');
        if (prodSelect) prodSelect.innerHTML = '<option value="">Selecione</option>' + produtos.map(p => `<option value="${p.id}">${p.produto}</option>`).join('');
    }
    
    // Carregar todos os dados
    async function carregarTodasTabelas() {
        document.getElementById('connStatus').textContent = '🟡 Carregando...';
        
        unidades = await listarDados('unidades');
        grupos = await listarDados('grupos');
        produtos = await listarDados('produtos');
        fornecedores = await listarDados('fornecedores');
        listaCompras = await listarDados('listaCompras');
        cotacoes = await listarDados('cotaFornecedor');
        
        renderUnidades();
        renderGrupos();
        renderProdutos();
        renderFornecedores();
        renderListaCompras();
        
        document.getElementById('connStatus').textContent = `🟢 OK (${unidades.length} und, ${grupos.length} grp)`;
    }
    
    // Navegação
    function mostrarTela(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(`screen-${screenId}`)?.classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.screen === screenId) btn.classList.add('active');
        });
    }
    
    // Gerar Cotação
    document.getElementById('btnGerarCotacao')?.addEventListener('click', () => {
        if (listaCompras.length === 0) return alert('Nenhum item na lista');
        alert(`Cotações geradas para ${listaCompras.length} itens!\n(Sistema integrado com Google Sheets)`);
    });
    
    // Inicialização
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => mostrarTela(btn.dataset.screen));
    });
    
    carregarTodasTabelas();
    mostrarTela('unidades');
</script>
</body>
</html>
